name: Defects UI Tests

on:
  push:
  pull_request:

jobs:
  defects-ui-tests:
    name: Defects UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          npm install
          npm --prefix web install
          npm --prefix backend install
      - name: Prepare Playwright browsers
        run: npm --prefix web run prepare:e2e
      - name: Start Backend server
        run: |
          PORT=3001 npm --prefix backend run start &
          sleep 5
      - name: Run Backend Security Tests
        run: |
          sleep 5
          npm --prefix backend run test:security
      - name: Start Web server
        run: |
          NEXT_PUBLIC_API_URL=http://localhost:3001/api npm --prefix web run dev &
          sleep 10
      - name: Run Defects UI tests
        run: |
          npm --prefix web run test:e2e:defects
