name: audit_app
description: "Аудит Техники - Мобильное приложение инспектора"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP Client
  http: ^1.2.0
  
  # Camera & Image
  camera: ^0.11.0+2
  image_picker: ^1.1.0
  
  # QR Code
  mobile_scanner: ^5.2.3
  
  # Location
  geolocator: ^13.0.1
  
  # State Management
  flutter_bloc: ^8.1.6
  provider: ^6.1.2
  
  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true